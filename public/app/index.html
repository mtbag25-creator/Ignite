<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ignite Markets App - Get Started</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0C0C0C;
  color: #F0F0F0;
}

.container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
  background: linear-gradient(135deg, rgba(232, 98, 26, 0.1) 0%, transparent 100%);
}

.box {
  max-width: 500px;
  background: #141414;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 16px;
  padding: 40px 30px;
}

.logo { font-size: 80px; margin-bottom: 20px; }

h1 {
  font-size: 36px;
  margin: 0 0 20px 0;
  background: linear-gradient(135deg, #E8621A 0%, #F07C38 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

p {
  font-size: 16px;
  color: #868686;
  line-height: 1.6;
  margin-bottom: 20px;
}

.buttons {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 30px;
}

a, button {
  padding: 15px 30px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 16px;
  text-decoration: none;
  cursor: pointer;
  border: none;
  transition: all 0.3s ease;
}

.btn-primary {
  background: #E8621A;
  color: white;
}

.btn-primary:hover {
  background: #F07C38;
  transform: translateY(-3px);
}

.btn-secondary {
  border: 2px solid #E8621A;
  background: transparent;
  color: #E8621A;
}

.btn-secondary:hover {
  background: rgba(232, 98, 26, 0.1);
  transform: translateY(-3px);
}

.hint {
  font-size: 12px;
  color: #484848;
  margin-top: 40px;
  padding-top: 30px;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.hint a {
  color: #E8621A;
  padding: 0;
}

@media (max-width: 480px) {
  .box { padding: 30px 20px; }
  h1 { font-size: 28px; }
  p { font-size: 14px; }
  a, button { padding: 12px 24px; font-size: 14px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="box">
    <div class="logo">🔥</div>
    <h1>Get Started</h1>
    
    <p>To use the full Ignite Markets app with email verification, you have two options:</p>
    
    <div class="buttons">
      <button class="btn-primary" onclick="showLocalSetup()">Local Setup</button>
      <a href="https://github.com/mtbag25-creator/Ignite" class="btn-secondary">Deploy</a>
    </div>
    
    <div class="hint">
      <strong>💡 Option 1 - Local (15 min):</strong> Follow <a href="https://github.com/mtbag25-creator/Ignite/blob/main/SETUP.md">SETUP.md</a>
      <br><br>
      <strong>🚀 Option 2 - Production (5 min):</strong> Follow <a href="https://github.com/mtbag25-creator/Ignite/blob/main/DEPLOYMENT.md">DEPLOYMENT.md</a>
      <br><br>
      <a href="https://github.com/mtbag25-creator/Ignite">View Full Code on GitHub ⭐</a>
    </div>
  </div>
</div>

<script>
function showLocalSetup() {
  alert(`Local Setup Instructions:

1. Clone: git clone https://github.com/mtbag25-creator/Ignite.git
2. Navigate: cd Ignite
3. Install: npm install
4. Setup .env with Gmail credentials
5. Run: npm start
6. Open: http://localhost:3000

Full details in SETUP.md`);
}
</script>

</body>
</html>
