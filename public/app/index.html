<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ignite Markets — Sports Prediction</title>
<style>
:root {
  --orange: #E8621A;
  --orange-light: #F07C38;
  --orange-faint: rgba(232,98,26,0.09);
  --bg: #0C0C0C;
  --surface: #141414;
  --surface-2: #1C1C1C;
  --surface-3: #242424;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.13);
  --text: #F0F0F0;
  --text-muted: #868686;
  --text-dim: #484848;
  --yes: #4FC97A;
  --no: #E05252;
  --draw: #E8A21A;
  --radius: 12px;
  --radius-lg: 16px;
  --ease: 0.2s cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,textarea,select{font-family:inherit}

/* NAV */
.nav{
  position:sticky;top:0;z-index:150;
  background:rgba(12,12,12,0.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 32px;height:58px;
  display:flex;align-items:center;gap:20px;
}
.nav-logo{font-size:19px;font-weight:800;letter-spacing:-0.5px;color:var(--orange);display:flex;align-items:center;gap:8px;white-space:nowrap}
.nav-logo svg{width:26px;height:26px;}
.nav-links{display:flex;gap:2px;margin-left:auto;}
.nav-link{padding:6px 12px;border-radius:6px;font-size:13px;color:var(--text-muted);transition:all var(--ease)}
.nav-link:hover{color:var(--text);background:var(--surface-2)}
.nav-link.active{color:var(--text)}
.nav-right{display:flex;align-items:center;gap:8px}
.btn-outline{padding:6px 14px;border-radius:7px;font-size:13px;font-weight:500;border:1px solid var(--border-strong);color:var(--text-muted);transition:all var(--ease)}
.btn-outline:hover{color:var(--text);border-color:rgba(255,255,255,0.22)}
.btn-orange{padding:6px 16px;border-radius:7px;font-size:13px;font-weight:600;background:var(--orange);color:#fff;transition:background var(--ease)}
.btn-orange:hover{background:var(--orange-light)}

/* MAIN */
.page-wrap{max-width:1200px;margin:0 auto;padding:0 28px}
.section{padding:44px 0 0}
.section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}
.section-title{font-size:16px;font-weight:700;letter-spacing:-0.2px}
.section-sub{font-size:12px;color:var(--text-dim);margin-top:2px}

/* MARKETS GRID */
.markets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.market-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color var(--ease),transform var(--ease);display:flex;flex-direction:column}
.market-card:hover{border-color:var(--border-strong);transform:translateY(-2px)}
.card-img{height:110px;background:#0C0C0C;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:0 12px 8px}
.card-sport-badge{position:absolute;top:8px;left:10px;font-size:10px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;background:rgba(232,98,26,0.12);color:var(--orange);border:1px solid rgba(232,98,26,0.25);border-radius:4px;padding:2px 7px}
.card-body{padding:14px;flex:1;display:flex;flex-direction:column}
.card-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:12px;flex:1;color:var(--text)}
.bet-bar-wrap{margin-bottom:10px}
.bet-bar-track{height:5px;background:#2a2a2a;border-radius:3px;overflow:hidden;display:flex}
.bet-bar-yes{background:var(--yes);transition:width 0.5s ease}
.bet-bar-draw{background:var(--draw);transition:width 0.5s ease}
.bet-bar-no{background:var(--no);transition:width 0.5s ease}
.bet-labels{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;font-weight:600;flex-wrap:wrap;gap:2px;min-width:0}
.lbl-yes{color:var(--yes);white-space:nowrap}
.lbl-draw{color:var(--draw);white-space:nowrap}
.lbl-no{color:var(--no);white-space:nowrap}
.card-meta{display:flex;gap:12px;padding-top:10px;border-top:1px solid var(--border);margin-top:2px}
.card-meta-item{font-size:11px;color:var(--text-dim)}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.88);overflow-y:auto;padding:20px}
.overlay.open{display:block}
.detail-box{max-width:860px;margin:0 auto;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius-lg);overflow:hidden}
.detail-top{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border)}
.detail-close{margin-left:auto;width:30px;height:30px;border-radius:6px;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-muted);transition:all var(--ease)}
.detail-close:hover{background:var(--surface-2);color:var(--text)}
.detail-body{display:grid;grid-template-columns:1fr 280px}
.detail-main{padding:24px;border-right:1px solid var(--border)}
.detail-sidebar{padding:20px}
.detail-lbl{font-size:10px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
.detail-desc{font-size:13px;color:var(--text-muted);line-height:1.65;margin-bottom:20px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.info-cell{background:var(--surface-2);border-radius:8px;padding:11px 13px}
.info-cell-lbl{font-size:10px;color:var(--text-dim);margin-bottom:3px}
.info-cell-val{font-size:13px;font-weight:600}

/* TRADE */
.trade-box{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.trade-ttl{font-size:13px;font-weight:700;margin-bottom:12px}
.trade-btns{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.t-btn{width:100%;padding:10px;border-radius:7px;font-size:13px;font-weight:700;border:1px solid;display:flex;justify-content:space-between;align-items:center;transition:all var(--ease)}
.t-yes{background:rgba(79,201,122,0.07);border-color:rgba(79,201,122,0.2);color:var(--yes)}
.t-yes.sel,.t-yes:hover{background:rgba(79,201,122,0.16);border-color:rgba(79,201,122,0.45)}
.t-draw{background:rgba(232,162,26,0.07);border-color:rgba(232,162,26,0.2);color:var(--draw)}
.t-draw.sel,.t-draw:hover{background:rgba(232,162,26,0.16);border-color:rgba(232,162,26,0.45)}
.t-no{background:rgba(224,82,82,0.07);border-color:rgba(224,82,82,0.18);color:var(--no)}
.t-no.sel,.t-no:hover{background:rgba(224,82,82,0.15);border-color:rgba(224,82,82,0.4)}
.amount-lbl{font-size:11px;color:var(--text-dim);margin-bottom:6px}
.presets{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.preset{padding:4px 10px;border-radius:5px;font-size:12px;font-weight:500;background:var(--surface-3);border:1px solid var(--border);color:var(--text-muted);transition:all var(--ease)}
.preset:hover{border-color:var(--orange);color:var(--orange-light)}
.amount-inp{width:100%;background:var(--surface-3);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-size:14px;font-weight:600;color:var(--text);outline:none;transition:border-color var(--ease);margin-bottom:12px}
.amount-inp:focus{border-color:var(--orange)}
.confirm-btn{width:100%;padding:11px;border-radius:7px;font-size:13px;font-weight:700;background:var(--orange);color:#fff;transition:background var(--ease)}
.confirm-btn:hover{background:var(--orange-light)}
.payout-note{text-align:center;font-size:11px;color:var(--text-dim);margin-top:8px}
.payout-note span{color:var(--text-muted)}

/* SPORT TABS */
.sport-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.sport-tab{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);color:var(--text-muted);background:transparent;transition:all var(--ease)}
.sport-tab:hover{border-color:var(--border-strong);color:var(--text)}
.sport-tab.active{background:var(--orange-faint);border-color:rgba(232,98,26,0.35);color:var(--orange-light)}

/* SIGNIN */
.signin-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.9);align-items:center;justify-content:center}
.signin-overlay.open{display:flex}
.signin-box{background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius-lg);padding:36px;width:100%;max-width:400px;position:relative}
.signin-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:6px;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text-muted);transition:all var(--ease)}
.signin-close:hover{color:var(--text)}
.signin-logo{font-size:22px;font-weight:800;color:var(--orange);margin-bottom:6px}
.signin-tagline{font-size:13px;color:var(--text-muted);margin-bottom:28px}
.signin-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--surface-2);border-radius:8px;padding:3px}
.signin-tab{flex:1;padding:7px;border-radius:6px;font-size:13px;font-weight:600;color:var(--text-muted);transition:all var(--ease)}
.signin-tab.active{background:var(--surface-3);color:var(--text)}
.s-field{margin-bottom:16px}
.s-lbl{display:block;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px}
.s-inp{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px 13px;font-size:14px;color:var(--text);outline:none;transition:border-color var(--ease)}
.s-inp:focus{border-color:var(--orange)}
.s-hint{font-size:11px;color:var(--text-dim);margin-top:5px}
.s-submit{width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:700;background:var(--orange);color:#fff;margin-top:20px;transition:background var(--ease)}
.s-submit:hover{background:var(--orange-light)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:9px;padding:12px 16px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;z-index:9999;transform:translateY(70px);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast-dot{width:7px;height:7px;background:var(--yes);border-radius:50%;flex-shrink:0}

@media(max-width:960px){
  .detail-body{grid-template-columns:1fr}
  .detail-sidebar{border-top:1px solid var(--border)}
  .nav{padding:0 14px}
  .page-wrap{padding:0 14px}
}
@media(max-width:600px){
  .markets-grid{grid-template-columns:1fr}
  .nav{padding:0 14px;height:auto;flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path fill="#CC0000" d="M50 8 C50 8 18 30 18 58 C18 76 32 90 50 90 C68 90 82 76 82 58 C82 30 50 8 50 8 Z"/><path fill="rgba(0,0,0,0.25)" d="M50 8 C50 8 34 30 34 58 C34 76 41 86 50 90 C50 90 50 8 50 8 Z"/><line x1="50" y1="90" x2="50" y2="72" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg>
    IGNITE
  </div>
  <div class="nav-links">
    <a class="nav-link active" href="#" onclick="showHome()">Markets</a>
  </div>
  <div class="nav-right">
    <button class="btn-outline" onclick="openSignIn()" id="nav-signin-btn">Sign in</button>
    <div id="nav-user-menu-wrap" style="display:none">
      <button class="btn-orange" onclick="toggleUserMenu()" id="nav-user-btn">JD ▾</button>
    </div>
  </div>
</nav>

<!-- PAGE -->
<div class="page-wrap" id="home-page">
  <div class="section">
    <div class="section-header"><div class="section-title">Sports Markets</div></div>
    <div class="sport-tabs" id="sport-tabs">
      <button class="sport-tab active" onclick="filterSport(this,'all')">🏆 All</button>
      <button class="sport-tab" onclick="filterSport(this,'NBA')">🏀 Basketball</button>
      <button class="sport-tab" onclick="filterSport(this,'Soccer')">⚽ Soccer</button>
      <button class="sport-tab" onclick="filterSport(this,'NFL')">🏈 Football</button>
      <button class="sport-tab" onclick="filterSport(this,'NHL')">🏒 Hockey</button>
      <button class="sport-tab" onclick="filterSport(this,'MLB')">⚾ Baseball</button>
      <button class="sport-tab" onclick="filterSport(this,'F1')">🏎 F1</button>
    </div>
    <div class="markets-grid" id="markets-grid"></div>
  </div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="market-overlay">
  <div class="detail-box">
    <div class="detail-top">
      <span id="d-sport-badge" style="font-size:12px;font-weight:700;color:var(--orange)">NBA</span>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body">
      <div class="detail-main">
        <div class="detail-lbl" style="margin-bottom:4px">Market</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:14px;line-height:1.3" id="d-title"></div>
        <div class="detail-lbl">About</div>
        <div class="detail-desc" id="d-desc"></div>
        <div class="info-grid">
          <div class="info-cell"><div class="info-cell-lbl">Closes</div><div class="info-cell-val" id="d-close"></div></div>
          <div class="info-cell"><div class="info-cell-lbl">Total bets</div><div class="info-cell-val" id="d-bets"></div></div>
        </div>
      </div>
      <div class="detail-sidebar">
        <div class="trade-box">
          <div class="trade-ttl">Place your bet</div>
          <div class="trade-btns" id="d-trade-btns"></div>
          <div class="amount-lbl">Amount (USD)</div>
          <div class="presets">
            <button class="preset" onclick="setAmt(10)">$10</button>
            <button class="preset" onclick="setAmt(25)">$25</button>
            <button class="preset" onclick="setAmt(100)">$100</button>
            <button class="preset" onclick="setAmt(250)">$250</button>
          </div>
          <input class="amount-inp" type="number" id="trade-amt" value="25" min="1" oninput="calcPayout()">
          <button class="confirm-btn" onclick="doBet()">Confirm bet</button>
          <div class="payout-note" id="payout-note">Potential payout: <span>$—</span></div>
        </div>
        <div style="margin-top:14px;background:var(--surface-2);border-radius:var(--radius);padding:14px;border:1px solid var(--border)">
          <div class="detail-lbl" style="margin-bottom:10px">Bet distribution</div>
          <div id="d-prob-bars"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- SIGNIN OVERLAY -->
<div class="signin-overlay" id="signin-overlay">
  <div class="signin-box">
    <button class="signin-close" onclick="closeSignIn()">✕</button>
    <div class="signin-logo">🔥 IGNITE</div>
    <div class="signin-tagline">Sports prediction markets, built different.</div>
    <div class="signin-tabs">
      <button class="signin-tab active" id="tab-in" onclick="switchTab('in')">Sign in</button>
      <button class="signin-tab" id="tab-up" onclick="switchTab('up')">Create account</button>
    </div>
    <div id="signin-form">
      <div class="s-field">
        <label class="s-lbl">Username</label>
        <input class="s-inp" type="text" id="signin-username" placeholder="Your username">
      </div>
      <div class="s-field">
        <label class="s-lbl">Password</label>
        <input class="s-inp" type="password" id="signin-password" placeholder="Your password">
      </div>
      <button class="s-submit" onclick="handleSignIn()">Sign in →</button>
    </div>
    <div id="signup-form" style="display:none">
      <div class="s-field">
        <label class="s-lbl">Username</label>
        <input class="s-inp" type="text" id="signup-username" placeholder="e.g. predictor99">
      </div>
      <div class="s-field">
        <label class="s-lbl">Email</label>
        <input class="s-inp" type="email" id="signup-email" placeholder="your@email.com">
      </div>
      <div class="s-field">
        <label class="s-lbl">Password</label>
        <input class="s-inp" type="password" id="signup-password" placeholder="Min. 8 characters">
      </div>
      <button class="s-submit" onclick="handleSignUp()">Create account →</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toast-msg">Done</span>
</div>

<script>
// ================================================================
// DATA STORE
// ================================================================
const betStore = {};

const SPORTS = {
  'lakers-celtics': {
    id:'lakers-celtics', sport:'NBA', emoji:'🏀',
    title:'Will the Los Angeles Lakers defeat the Celtics in Game 7?',
    teams:['Lakers','Celtics'],
    desc:'Game 7 of the NBA Eastern Conference Finals. The Lakers entered as underdogs but fought back from 3-2 down.',
    closing:'Jun 8, 2025 · 11:59 PM ET',
    volume:'$41.2K', threeWay:false,
  },
  'ucl-final': {
    id:'ucl-final', sport:'Soccer', emoji:'⚽',
    title:'UEFA Champions League Final — Real Madrid vs Bayern Munich',
    teams:['Real Madrid','Bayern Munich'],
    desc:'The 2025 Champions League Final. Real Madrid chase their 16th title against a resurgent Bayern side.',
    closing:'Jun 1, 2025 · 2:45 PM ET',
    volume:'$88.7K', threeWay:true,
  },
  'chiefs-broncos': {
    id:'chiefs-broncos', sport:'NFL', emoji:'🏈',
    title:'Will the Kansas City Chiefs beat the Denver Broncos — Week 1?',
    teams:['Chiefs','Broncos'],
    desc:'AFC West rivalry opener. Mahomes vs the new-look Broncos in Arrowhead.',
    closing:'Sep 6, 2025 · 4:25 PM ET',
    volume:'$22.1K', threeWay:false,
  },
  'leafs-rangers': {
    id:'leafs-rangers', sport:'NHL', emoji:'🏒',
    title:'Toronto Maple Leafs vs New York Rangers — Stanley Cup Playoffs',
    teams:['Leafs','Rangers'],
    desc:'Conference semifinals, Game 5. Leafs up 3-1 in the series.',
    closing:'Jun 4, 2025 · 7:30 PM ET',
    volume:'$15.4K', threeWay:true,
  },
  'yankees-redsox': {
    id:'yankees-redsox', sport:'MLB', emoji:'⚾',
    title:'New York Yankees vs Boston Red Sox — rivalry series opener',
    teams:['Yankees','Red Sox'],
    desc:'Opening game of the most storied rivalry in baseball. Yankee Stadium, Saturday night.',
    closing:'Jun 14, 2025 · 7:05 PM ET',
    volume:'$9.8K', threeWay:false,
  },
  'f1-monaco': {
    id:'f1-monaco', sport:'F1', emoji:'🏎',
    title:'F1 Monaco Grand Prix — Will Max Verstappen win the race?',
    teams:['Verstappen','Field'],
    desc:'The crown jewel of Formula 1. Monaco street circuit, Round 8 of the 2025 season.',
    closing:'May 25, 2025 · 2:00 PM ET',
    volume:'$31.5K', threeWay:false,
  },
  'warriors-nuggets': {
    id:'warriors-nuggets', sport:'NBA', emoji:'🏀',
    title:'Golden State Warriors vs Denver Nuggets — Playoff Game 6',
    teams:['Warriors','Nuggets'],
    desc:'Warriors need a win to stay alive. Steph Curry vs Nikola Jokic.',
    closing:'Jun 10, 2025 · 9:30 PM ET',
    volume:'$27.3K', threeWay:false,
  },
  'arsenal-spurs': {
    id:'arsenal-spurs', sport:'Soccer', emoji:'⚽',
    title:'Arsenal vs Tottenham — North London Derby',
    teams:['Arsenal','Tottenham'],
    desc:'The most intense derby in the Premier League. Season finale with title implications.',
    closing:'May 18, 2025 · 12:30 PM ET',
    volume:'$19.2K', threeWay:true,
  },
};

Object.keys(SPORTS).forEach(id => {
  betStore[id] = { YES:0, NO:0, DRAW:0 };
});

const seeds = {
  'lakers-celtics':{YES:491,NO:356},
  'ucl-final':{YES:312,NO:180,DRAW:155},
  'chiefs-broncos':{YES:578,NO:201},
  'leafs-rangers':{YES:289,NO:140,DRAW:98},
  'yankees-redsox':{YES:203,NO:134},
  'f1-monaco':{YES:441,NO:287},
  'warriors-nuggets':{YES:199,NO:234},
  'arsenal-spurs':{YES:321,NO:167,DRAW:204},
};
Object.entries(seeds).forEach(([id,s]) => {
  betStore[id] = {...betStore[id], ...s};
});

function getBetPcts(id) {
  const s = betStore[id];
  const total = s.YES + s.NO + (s.DRAW||0);
  if (total === 0) return {yes:50,no:50,draw:0};
  const yes = Math.round(s.YES/total*100);
  const draw = s.DRAW ? Math.round(s.DRAW/total*100) : 0;
  const no = 100 - yes - draw;
  return {yes,no,draw,total};
}

function getTotalBets(id) {
  const s = betStore[id];
  return s.YES + s.NO + (s.DRAW||0);
}

// ================================================================
// RENDER
// ================================================================
let currentFilter = 'all';
let loggedIn = false;
let currentUser = null;
let currentMarket = null;
let selectedOutcome = 'YES';

function renderGrid(filter) {
  currentFilter = filter;
  const grid = document.getElementById('markets-grid');
  const list = (filter === 'all' ? Object.values(SPORTS) : Object.values(SPORTS).filter(m => m.sport === filter));
  grid.innerHTML = list.map(m => {
    const p = getBetPcts(m.id);
    const total = getTotalBets(m.id);
    const barHTML = m.threeWay
      ? `<div class="bet-bar-track"><div class="bet-bar-yes" style="width:${p.yes}%"></div><div class="bet-bar-draw" style="width:${p.draw}%"></div><div class="bet-bar-no" style="width:${p.no}%"></div></div>
         <div class="bet-labels"><span class="lbl-yes">YES ${p.yes}%</span><span class="lbl-draw">DRAW ${p.draw}%</span><span class="lbl-no">NO ${p.no}%</span></div>`
      : `<div class="bet-bar-track"><div class="bet-bar-yes" style="width:${p.yes}%"></div><div class="bet-bar-no" style="width:${p.no}%"></div></div>
         <div class="bet-labels"><span class="lbl-yes">YES ${p.yes}%</span><span class="lbl-no">NO ${p.no}%</span></div>`;
    return `<div class="market-card" onclick="openDetail('${m.id}')">
      <div class="card-img">
        <div class="card-sport-badge">${m.emoji} ${m.sport}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${m.title}</div>
        <div class="bet-bar-wrap">${barHTML}</div>
        <div class="card-meta">
          <div class="card-meta-item">🎯 ${total.toLocaleString()} bets</div>
          <div class="card-meta-item">⏱ ${m.closing.split('·')[0].trim()}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterSport(btn, sport) {
  document.querySelectorAll('.sport-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(sport);
}

function openDetail(id) {
  const m = SPORTS[id];
  currentMarket = m;
  selectedOutcome = 'YES';
  const p = getBetPcts(id);
  document.getElementById('d-sport-badge').textContent = `${m.emoji} ${m.sport}`;
  document.getElementById('d-title').textContent = m.title;
  document.getElementById('d-desc').textContent = m.desc;
  document.getElementById('d-close').textContent = m.closing;
  document.getElementById('d-bets').textContent = getTotalBets(id).toLocaleString();
  
  const tb = document.getElementById('d-trade-btns');
  if (m.threeWay) {
    tb.innerHTML = `
      <button class="t-btn t-yes sel" onclick="selOut(this,'YES')"><span>Bet YES</span><span>${p.yes}%</span></button>
      <button class="t-btn t-draw" onclick="selOut(this,'DRAW')"><span>Bet DRAW</span><span>${p.draw}%</span></button>
      <button class="t-btn t-no" onclick="selOut(this,'NO')"><span>Bet NO</span><span>${p.no}%</span></button>`;
  } else {
    tb.innerHTML = `
      <button class="t-btn t-yes sel" onclick="selOut(this,'YES')"><span>Bet YES</span><span>${p.yes}%</span></button>
      <button class="t-btn t-no" onclick="selOut(this,'NO')"><span>Bet NO</span><span>${p.no}%</span></button>`;
  }
  
  const pb = document.getElementById('d-prob-bars');
  if (m.threeWay) {
    pb.innerHTML = `
      <div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--yes)">YES</span><span style="color:var(--yes)">${p.yes}%</span></div><div style="height:4px;background:#222;border-radius:2px"><div style="width:${p.yes}%;height:100%;background:var(--yes);border-radius:2px"></div></div></div>
      <div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--draw)">DRAW</span><span style="color:var(--draw)">${p.draw}%</span></div><div style="height:4px;background:#222;border-radius:2px"><div style="width:${p.draw}%;height:100%;background:var(--draw);border-radius:2px"></div></div></div>
      <div><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--no)">NO</span><span style="color:var(--no)">${p.no}%</span></div><div style="height:4px;background:#222;border-radius:2px"><div style="width:${p.no}%;height:100%;background:var(--no);border-radius:2px"></div></div></div>`;
  } else {
    pb.innerHTML = `
      <div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--yes)">YES</span><span style="color:var(--yes)">${p.yes}%</span></div><div style="height:4px;background:#222;border-radius:2px"><div style="width:${p.yes}%;height:100%;background:var(--yes);border-radius:2px"></div></div></div>
      <div><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--no)">NO</span><span style="color:var(--no)">${p.no}%</span></div><div style="height:4px;background:#222;border-radius:2px"><div style="width:${p.no}%;height:100%;background:var(--no);border-radius:2px"></div></div></div>`;
  }
  
  calcPayout();
  document.getElementById('market-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('market-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function selOut(btn, out) {
  selectedOutcome = out;
  document.querySelectorAll('#d-trade-btns .t-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  calcPayout();
}

function setAmt(v) {
  document.getElementById('trade-amt').value = v;
  calcPayout();
}

function calcPayout() {
  if (!currentMarket) return;
  const amt = parseFloat(document.getElementById('trade-amt').value) || 0;
  const p = getBetPcts(currentMarket.id);
  const pct = selectedOutcome === 'YES' ? p.yes : selectedOutcome === 'DRAW' ? p.draw : p.no;
  const pay = pct > 0 ? (amt / (pct/100)).toFixed(2) : '—';
  document.getElementById('payout-note').innerHTML = `Potential payout: <span>$${pay}</span>`;
}

function doBet() {
  if (!currentMarket) return;
  const amt = parseFloat(document.getElementById('trade-amt').value) || 0;
  if (!loggedIn) {
    closeDetail();
    openSignIn();
    showToast('Sign in to place bets');
    return;
  }
  betStore[currentMarket.id][selectedOutcome]++;
  showToast(`$${amt} bet on ${selectedOutcome} placed`);
  closeDetail();
  renderGrid(currentFilter);
}

function showHome() {
  renderGrid('all');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ================================================================
// SIGNIN / SIGNUP
// ================================================================
const userStore = {};

function openSignIn() {
  document.getElementById('signin-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSignIn() {
  document.getElementById('signin-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function switchTab(tab) {
  document.getElementById('tab-in').classList.toggle('active', tab === 'in');
  document.getElementById('tab-up').classList.toggle('active', tab === 'up');
  document.getElementById('signin-form').style.display = tab === 'in' ? '' : 'none';
  document.getElementById('signup-form').style.display = tab === 'up' ? '' : 'none';
}

function handleSignIn() {
  const username = document.getElementById('signin-username').value.trim();
  const pw = document.getElementById('signin-password').value.trim();
  if (!username) { showToast('Enter your username'); return; }
  if (!pw) { showToast('Enter your password'); return; }
  const u = userStore[username.toLowerCase()];
  if (!u) { showToast('Username not found — create an account'); return; }
  if (u.password !== pw) { showToast('Incorrect password'); return; }
  loggedIn = true;
  currentUser = { initials: username.substring(0,2).toUpperCase(), name: username };
  document.getElementById('nav-signin-btn').style.display = 'none';
  document.getElementById('nav-user-menu-wrap').style.display = '';
  document.getElementById('nav-user-btn').textContent = currentUser.initials + ' ▾';
  closeSignIn();
  showToast(`Welcome back, ${username}!`);
}

function handleSignUp() {
  const username = document.getElementById('signup-username').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value.trim();
  if (!username) { showToast('Enter a username'); return; }
  if (!email || !email.includes('@')) { showToast('Enter a valid email'); return; }
  if (password.length < 8) { showToast('Password must be at least 8 characters'); return; }
  if (userStore[username.toLowerCase()]) { showToast('Username already taken'); return; }
  
  // Simulate email code verification
  const code = Math.floor(100000 + Math.random() * 900000);
  alert(`Verification code sent to ${email}:\n\n${code}\n\n(This is a demo - normally sent via email)`);
  
  const userCode = prompt(`Enter the 6-digit code:`);
  if (userCode !== code.toString()) { showToast('Invalid code'); return; }
  
  userStore[username.toLowerCase()] = { password, email, created: new Date() };
  loggedIn = true;
  currentUser = { initials: username.substring(0,2).toUpperCase(), name: username };
  document.getElementById('nav-signin-btn').style.display = 'none';
  document.getElementById('nav-user-menu-wrap').style.display = '';
  document.getElementById('nav-user-btn').textContent = currentUser.initials + ' ▾';
  
  document.getElementById('signup-username').value = '';
  document.getElementById('signup-email').value = '';
  document.getElementById('signup-password').value = '';
  document.getElementById('tab-in').click();
  closeSignIn();
  showToast(`Welcome, ${username}!`);
}

function toggleUserMenu() {
  loggedIn = false;
  currentUser = null;
  document.getElementById('nav-signin-btn').style.display = '';
  document.getElementById('nav-user-menu-wrap').style.display = 'none';
  showToast('Signed out');
}

// ================================================================
// INIT
// ================================================================
renderGrid('all');
</script>
</body>
</html>
